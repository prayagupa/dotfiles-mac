# Starship prompt — mirrors the original .bash_prompt (Solarized Dark)
# Docs: https://starship.rs/config/

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

[username]
style_user  = "bold yellow"   # orange-ish, like the original
style_root  = "bold red"
show_always = false            # only shown when root or SSH

[hostname]
style     = "bold red"
ssh_only  = true               # only shown over SSH, matching original hostStyle

[directory]
style              = "bold green"
truncation_length  = 4
truncate_to_repo   = false

[git_branch]
symbol = " "                  # nerd-font branch icon
style  = "bold purple"        # violet, matching original
format = "on [$symbol$branch]($style) "

[git_status]
style     = "bold blue"
staged    = "+"
modified  = "!"
untracked = "?"
stashed   = "\\$"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
format    = '([\[$all_status$ahead_behind\]]($style) )'

[character]
success_symbol = "[❯](bold white)"
error_symbol   = "[❯](bold red)"

[line_break]
disabled = false
